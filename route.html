<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PoliRide Route Map</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Leaflet (Map) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css"/>

    <link rel="stylesheet" href="css/route.css"/>
</head>
<body>
<body>
    <div class="container my-5">
        
        <div id="map" class="mb-5 glass-border"></div>

    </div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>

<script>
    // 1. Map Initialization
    var map = L.map('map').setView([5.795, 102.598], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // 2. Data: Locations & Coordinates
    const poliPoint = [5.7950567, 102.5980021];
    const destinations = {
        'bukitkeluang': {
            coords: [5.7976178, 102.6095307],
            name: "Bukit Keluang",
            desc: "Healing at the hills!"
        },
        'jerteh': {
            coords: [5.733, 102.489],
            name: "Bandar Jerteh",
            desc: "Town center and shopping."
        },
        'pantai': {coords: [5.803, 102.605],
            
            name: "Pantai Bukit Keluang",
            desc: "Beach vibes only."
        }
    };

    // 3. Logic to Draw the Route
    function drawPoliRoute(targetKey) {
        const dest = destinations[targetKey];
        
        if (dest) {
            // Add Marker for Politeknik
            L.marker(poliPoint).addTo(map).bindPopup("<b>Politeknik Besut</b>");

            // Add Marker for Destination
            L.marker(dest.coords).addTo(map).bindPopup(`<b>${dest.name}</b><br>${dest.desc}`).openPopup();

            // Draw the Path
            var path = L.polyline([poliPoint, dest.coords], {
                color: '#00d2ff',
                weight: 6,
                opacity: 0.8,
                dashArray: '10, 10'
            }).addTo(map);

            // Zoom to fit
            map.fitBounds(path.getBounds(), { padding: [50, 50] });
        } else {
            // Default view if no valid "to" parameter is found
            L.marker(poliPoint).addTo(map).bindPopup("Politeknik Besut").openPopup();
        }
    }

    // 4. THE MAGIC: Read the URL Parameter (?to=xxxx)
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const destinationKey = urlParams.get('to'); // Gets 'bukitkeluang' from ?to=bukitkeluang
        
        drawPoliRoute(destinationKey);
    };
</script>

</body>
</html>
